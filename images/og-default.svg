  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Top border line -->
  <rect x="64" y="64" width="80" height="1" fill="#c9a96e" opacity="0.7"/>
  <!-- Eyebrow -->
  <text x="64" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="400" fill="#c9a96e" letter-spacing="4" opacity="0.9">PRODUCER &amp; GHOST PRODUCER</text>
  <!-- Main headline -->
  <text x="64" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#f0ece4" letter-spacing="-3">Dan Heale</text>
  <!-- Subline italic -->
  <text x="64" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic" font-weight="400" fill="#c9a96e">Release-ready ghost production.</text>
  <!-- Divider -->
  <rect x="64" y="380" width="1072" height="1" fill="#f0ece4" opacity="0.08"/>
  <!-- Stats -->
  <text x="64" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#f0ece4">100M+</text>
  <text x="64" y="490" font-family="'Courier New', monospace" font-size="12" font-weight="400" fill="#f0ece4" letter-spacing="3" opacity="0.45">STREAMS</text>
  <rect x="233" y="422" width="1" height="76" fill="#f0ece4" opacity="0.12"/>
  <text x="257" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#f0ece4">200+</text>
  <text x="257" y="490" font-family="'Courier New', monospace" font-size="12" font-weight="400" fill="#f0ece4" letter-spacing="3" opacity="0.45">TRACKS DELIVERED</text>
  <rect x="466" y="422" width="1" height="76" fill="#f0ece4" opacity="0.12"/>
  <text x="490" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#f0ece4">10+</text>
  <text x="490" y="490" font-family="'Courier New', monospace" font-size="12" font-weight="400" fill="#f0ece4" letter-spacing="3" opacity="0.45">YEARS EXPERIENCE</text>
