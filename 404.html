<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>404 — Page Not Found | Dan Heale</title>
  <meta name="description" content="This page doesn't exist or has been moved.">
  <meta name="robots" content="noindex, follow">

  <!-- Favicon: inline SVG gold DH monogram -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230e0d0b'/><text x='50' y='72' text-anchor='middle' font-family='Georgia,Times New Roman,serif' font-size='58' font-weight='700' fill='%23c9a96e' letter-spacing='-3'>DH</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #0e0d0b;
      --bg-elevated:  #151412;
      --bg-subtle:    #1a1917;
      --accent:       #c9a96e;
      --accent-dim:   rgba(201, 169, 110, 0.15);
      --accent-glow:  rgba(201, 169, 110, 0.06);
      --text:         #f0ece4;
      --text-mid:     rgba(240, 236, 228, 0.55);
      --text-dim:     rgba(240, 236, 228, 0.3);
      --border:       rgba(240, 236, 228, 0.08);
      --border-hover: rgba(240, 236, 228, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAV ───────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(14, 13, 11, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      transition: color 0.3s ease;
    }

    .nav-logo:hover { color: var(--accent); }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ─── MAIN ──────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 140px 64px 100px;
      position: relative;
    }

    main::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100%;
      background: radial-gradient(ellipse at 50% 30%, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
    }

    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(100px, 18vw, 180px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--accent);
      margin-bottom: 16px;
      position: relative;
    }

    .error-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 20px;
    }

    .error-message {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-mid);
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 48px;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 40px;
      background: var(--accent);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: background 0.35s ease, transform 0.35s ease, box-shadow 0.35s ease;
    }

    .home-btn:hover {
      background: #d4b67a;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(201, 169, 110, 0.2);
    }

    .home-btn .arrow { transition: transform 0.3s ease; }
    .home-btn:hover .arrow { transform: translateX(4px); }

    @keyframes gold-shimmer {
      0%   { transform: translateX(-100%) skewX(-12deg); }
      100% { transform: translateX(250%)  skewX(-12deg); }
    }

    .home-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.14) 50%,
        transparent 100%
      );
      animation: gold-shimmer 4s ease-in-out infinite;
      pointer-events: none;
    }

    /* ─── FOOTER ────────────────────────────────────────── */
    footer {
      padding: 48px 64px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left { font-size: 13px; color: var(--text-dim); }

    .footer-links { display: flex; gap: 24px; list-style: none; }

    .footer-links a {
      font-size: 13px;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-links a:hover { color: var(--accent); }

    /* ─── REDUCED MOTION ────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .home-btn::after { animation: none; }
      .home-btn { transition: none; }
    }

    /* ─── MOBILE ────────────────────────────────────────── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      main { padding: 120px 24px 60px; }
      footer {
        padding: 32px 24px;
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
    }
  </style>

  <!-- Google Analytics -->

</head>
<body>

<!-- ─── NAV ──────────────────────────────────────────────── -->
<nav role="banner">
  <a href="https://danheale.com" class="nav-logo" aria-label="Dan Heale — home">Dan Heale</a>
</nav>


<!-- ─── MAIN ──────────────────────────────────────────────── -->
<main>
  <div class="error-code" aria-label="Error 404">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-message">This page doesn't exist or has been moved.</p>
  <a href="https://danheale.com" class="home-btn">
    Back to danheale.com <span class="arrow" aria-hidden="true">&#8594;</span>
  </a>
</main>


<!-- ─── FOOTER ─────────────────────────────────────────────── -->
<footer role="contentinfo">
  <div class="footer-left">&copy; 2026 Dan Heale. All rights reserved.</div>
  <ul class="footer-links">
    <li><a href="https://danheale.com">Back to main site</a></li>
  </ul>
</footer>


</body>
</html>
